  <rect x="150" y="638" width="1050" height="72" rx="22" fill="#F97316" fill-opacity="0.12" stroke="#FB923C" stroke-opacity="0.45"/>
  <text x="190" y="684" fill="#FED7AA" font-family="Arial, sans-serif" font-size="24" font-weight="700">核心判断：配置要服务真实工作流，不要为了“看起来高级”提前打开所有能力。</text>
