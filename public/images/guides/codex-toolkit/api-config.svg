  <text x="176" y="495" fill="#eff4ff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="800">应用到 Codex</text>
  <rect x="55" y="518" width="327" height="40" rx="10" fill="#87a4ff"/>
  <text x="161" y="544" fill="#fff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="800">应用并重启 Codex</text>

  <rect x="410" y="217" width="7" height="134" rx="4" fill="#748097" opacity=".7"/>
  <rect x="25" y="576" width="34" height="19" rx="9.5" fill="#809dff"/>
  <circle cx="50" cy="585.5" r="8" fill="#fff"/>
  <text x="72" y="592" fill="#fff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800">日间/夜间</text>
  <text x="363" y="592" fill="#fff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800">x  退出</text>
