      <stop offset="1" stop-color="#07101d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#111c31"/>
      <stop offset="1" stop-color="#091423"/>
    </linearGradient>
  </defs>
  <rect width="444" height="620" rx="22" fill="#050b16"/>
  <rect x="4" y="6" width="436" height="608" rx="22" fill="url(#shell)" stroke="#354a73"/>
  <text x="25" y="42" fill="#fff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700">Codex Toolkit</text>
  <text x="25" y="65" fill="#8fb0e9" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">刷新 下午11:11:11 | 事件 刚刚</text>
  <circle cx="360" cy="43" r="17" fill="#0b1628"/>
  <path d="M360 34v8m5-5a8 8 0 1 1-10 0" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="402" cy="43" r="17" fill="#0b1628"/>
  <path d="M402 35v3m0 10v3m8-8h-3m-10 0h-3m13.2-5.2-2.1 2.1m-7.2 7.2-2.1 2.1m11.4 0-2.1-2.1m-7.2-7.2-2.1-2.1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="402" cy="43" r="4" fill="none" stroke="#fff" stroke-width="1.8"/>

  <rect x="25" y="80" width="392" height="500" rx="24" fill="#0b1526" stroke="#273d61"/>
  <rect x="55" y="79" width="327" height="40" rx="11" fill="#172234" stroke="#344462"/>
  <text x="67" y="104" fill="#e7edf9" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700">https://api.moshushi.xyz/v1</text>

  <text x="55" y="146" fill="#a8bbdb" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">API Key</text>
