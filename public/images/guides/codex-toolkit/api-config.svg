<svg xmlns="http://www.w3.org/2000/svg" width="444" height="620" viewBox="0 0 444 620" role="img" aria-labelledby="title desc">
  <title id="title">Codex Toolkit API configuration screen</title>
  <desc id="desc">A dark Codex Toolkit panel showing API endpoint, masked key, test model, route status, and apply buttons.</desc>
  <defs>
