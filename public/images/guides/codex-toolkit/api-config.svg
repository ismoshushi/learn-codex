  <rect x="328" y="157" width="54" height="41" rx="14" fill="#101b2b" stroke="#344462"/>
  <text x="342" y="183" fill="#e8eef8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700">显示</text>

  <text x="55" y="226" fill="#a8bbdb" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">测试模型</text>
  <rect x="55" y="238" width="327" height="41" rx="12" fill="#162132" stroke="#344462"/>
  <text x="68" y="264" fill="#e8eef8" font-family="Arial, sans-serif" font-size="15" font-weight="700">gpt-5.5</text>

