  <text x="38" y="326" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800">5/31 23:05 (5 分钟前)</text>

  <rect x="25" y="353" width="188" height="66" rx="16" fill="url(#card)" stroke="#284063"/>
  <text x="38" y="379" fill="#91b2ec" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">上下文窗口</text>
  <text x="38" y="403" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800">258K</text>

  <rect x="223" y="353" width="188" height="66" rx="16" fill="url(#card)" stroke="#284063"/>
  <text x="236" y="379" fill="#91b2ec" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">扫描文件</text>
  <text x="236" y="403" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800">130</text>

  <rect x="25" y="434" width="386" height="44" rx="16" fill="#142342" stroke="#284063"/>
  <text x="39" y="463" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800">详细 token 用量</text>
  <text x="384" y="463" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800">▲</text>

  <rect x="25" y="495" width="386" height="114" rx="16" fill="#07111f" stroke="#243a5c"/>
  <text x="39" y="526" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800">会话总计</text>
  <text x="315" y="526" fill="#a9c5f3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">总计 2,565,754</text>
  <path d="M25 552h386" stroke="#263a5c"/>
  <rect x="25" y="576" width="34" height="19" rx="9.5" fill="#809dff"/>
  <circle cx="50" cy="585.5" r="8" fill="#ffffff"/>
  <text x="72" y="592" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="800">日间/夜间</text>
  <text x="363" y="592" fill="#ffffff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800">x  退出</text>

  <rect x="411" y="255" width="7" height="120" rx="4" fill="#6f7c92" opacity=".65"/>
